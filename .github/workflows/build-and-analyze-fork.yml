name: Code test and analysis (fork)
permissions: {}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
jobs:
  test:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    name: Build and Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
          persist-credentials: false
          
      - name: dotnet build
        run: dotnet build Altinn.Common.AccessToken.slnx -v m

      - name: dotnet test
        run: dotnet test Altinn.Common.AccessToken.slnx --results-directory TestResults/ --collect:"XPlat Code Coverage" -v m

      - name: Generate coverage results
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:TestResults/**/coverage.cobertura.xml -targetdir:TestResults/Output/CoverageReport -reporttypes:Cobertura

      - name: Archive code coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-coverage-report
          path: TestResults/Output/CoverageReport/

  code-coverage:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
    name: Report code coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download Coverage Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: code-coverage-report
          path: dist/
      - name: Create Coverage Summary Report
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: dist/Cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      # Step disabled until workaround available for commenting PR
      # - name: Add Coverage PR Comment
      #   uses: marocchino/sticky-pull-request-comment@v2
      #   with:
      #     recreate: true
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     path: code-coverage-results.md
